<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2048</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* CRT scanlines */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 3px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── TITLE ROW ── */
    .title-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 460px;
      margin-bottom: 16px;
    }

    h1 {
      color: #f5c518;
      font-size: 28px;
      letter-spacing: 4px;
      text-shadow: 4px 4px 0px #b8860b;
      image-rendering: pixelated;
    }

    /* ── SCORE BOXES ── */
    .scores {
      display: flex;
      flex-direction: row;
      gap: 10px;
    }

    .score-box {
      background: #2d2d4e;
      border: 3px solid #4a4a7a;
      padding: 8px 14px;
      text-align: center;
      min-width: 90px;
    }

    .score-box .label {
      color: #888;
      font-size: 6px;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .score-box .value {
      color: #fff;
      font-size: 11px;
    }

    /* ── SUBTITLE ── */
    .subtitle {
      color: #555;
      font-size: 6px;
      letter-spacing: 1px;
      margin-bottom: 14px;
      text-align: center;
    }

    /* ── CONTROLS ROW ── */
    .controls-top {
      display: flex;
      flex-direction: row;
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn {
      background: #2d2d4e;
      border: 2px solid #4a4a7a;
      color: #aaa;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 8px 14px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.1s;
    }
    .btn:hover { border-color: #f5c518; color: #f5c518; }

    /* ── GRID WRAPPER ── */
    .grid-wrapper {
      background: #2d2d4e;
      border: 4px solid #4a4a7a;
      padding: 10px;
      position: relative;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      grid-template-rows:    repeat(4, 100px);
      gap: 10px;
    }

    /* ── CELL (empty slot) ── */
    .cell {
      background: #1a1a3e;
      border: 2px solid #2d2d5e;
      width: 100px;
      height: 100px;
    }

    /* ── TILE ── */
    .tile {
      position: absolute;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      font-weight: bold;
      border-radius: 3px;
      transition: top 0.1s ease, left 0.1s ease;
      image-rendering: pixelated;
      box-shadow: 3px 3px 0px rgba(0,0,0,0.4);
    }

    .tile.new-tile {
      animation: popIn 0.15s ease-out;
    }

    .tile.merge-tile {
      animation: mergePop 0.18s ease-out;
    }

    @keyframes popIn {
      0%   { transform: scale(0); }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes mergePop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    /* ── TILE COLORS — retro pixel palette ── */
    .t-2    { background:#3d3d6b; color:#c8c8ff; font-size:22px; border:3px solid #5a5a9a; }
    .t-4    { background:#4a3d6b; color:#d4b8ff; font-size:22px; border:3px solid #7a5a9a; }
    .t-8    { background:#6b3d4a; color:#ffb8c8; font-size:22px; border:3px solid #9a5a6b; }
    .t-16   { background:#6b4a3d; color:#ffd4b8; font-size:20px; border:3px solid #9a7a5a; }
    .t-32   { background:#6b5c3d; color:#fff0b8; font-size:20px; border:3px solid #9a8a5a; }
    .t-64   { background:#3d6b3d; color:#b8ffb8; font-size:20px; border:3px solid #5a9a5a; }
    .t-128  { background:#3d6b5c; color:#b8fff0; font-size:16px; border:3px solid #5a9a7a; }
    .t-256  { background:#3d5c6b; color:#b8e8ff; font-size:16px; border:3px solid #5a7a9a; }
    .t-512  { background:#5c3d6b; color:#e8b8ff; font-size:16px; border:3px solid #7a5a9a; }
    .t-1024 { background:#6b3d3d; color:#ffb8b8; font-size:12px; border:3px solid #9a5a5a; }
    .t-2048 { background:#f5c518; color:#000;    font-size:12px; border:3px solid #b8860b; box-shadow: 0 0 20px rgba(245,197,24,0.8), 3px 3px 0 rgba(0,0,0,0.4); }
    .t-big  { background:#ff6b35; color:#fff;    font-size:10px; border:3px solid #cc4400; }

    /* ── OVERLAY (win/lose) ── */
    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 10;
    }

    #overlay h2 {
      font-size: 18px;
      text-align: center;
      line-height: 1.8;
    }

    #overlay p {
      color: #888;
      font-size: 7px;
      text-align: center;
      line-height: 2.2;
    }

    .win-text  { color: #f5c518; text-shadow: 0 0 16px rgba(245,197,24,0.8); }
    .lose-text { color: #e74c3c; }

    /* ── MOBILE SWIPE ARROWS ── */
    .arrow-pad {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
    }

    .arrow-row {
      display: flex;
      flex-direction: row;
      gap: 6px;
    }

    .arrow-btn {
      width: 52px;
      height: 52px;
      background: #2d2d4e;
      border: 2px solid #4a4a7a;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: all 0.1s;
    }
    .arrow-btn:active { background: #4a4a7a; transform: scale(0.93); }

    /* ── HOW TO PLAY ── */
    .how-to {
      margin-top: 16px;
      color: #444;
      font-size: 6px;
      letter-spacing: 1px;
      text-align: center;
      line-height: 2.4;
    }
  </style>
</head>
<body>

  <!-- TITLE ROW -->
  <div class="title-row">
    <h1>2048</h1>
    <div class="scores">
      <div class="score-box">
        <div class="label">SCORE</div>
        <div class="value" id="scoreDisplay">0</div>
      </div>
      <div class="score-box">
        <div class="label">BEST</div>
        <div class="value" id="bestDisplay">0</div>
      </div>
    </div>
  </div>

  <div class="subtitle">JOIN THE TILES — REACH 2048!</div>

  <!-- TOP CONTROLS -->
  <div class="controls-top">
    <button class="btn" onclick="newGame()">↺ NEW GAME</button>
    <button class="btn" onclick="undoMove()">↩ UNDO</button>
  </div>

  <!-- GRID -->
  <div class="grid-wrapper">
    <div class="grid" id="grid">
      <!-- 16 empty cells -->
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>

    <!-- WIN/LOSE OVERLAY -->
    <div id="overlay">
      <h2 id="overlayTitle"></h2>
      <p id="overlayMsg"></p>
      <button class="btn" onclick="newGame()" style="border-color:#f5c518;color:#f5c518;">▶ PLAY AGAIN</button>
    </div>
  </div>

  <!-- ARROW PAD (mobile/mouse) -->
  <div class="arrow-pad">
    <div class="arrow-row">
      <div style="width:52px"></div>
      <button class="arrow-btn" onclick="move('up')">▲</button>
      <div style="width:52px"></div>
    </div>
    <div class="arrow-row">
      <button class="arrow-btn" onclick="move('left')">◄</button>
      <button class="arrow-btn" onclick="move('down')">▼</button>
      <button class="arrow-btn" onclick="move('right')">►</button>
    </div>
  </div>

  <div class="how-to">
    USE ARROW KEYS OR SWIPE TO SLIDE TILES<br>
    SAME NUMBERS MERGE WHEN THEY TOUCH<br>
    REACH 2048 TO WIN!
  </div>

<script>
  const GRID_SIZE = 4;
  const GAP       = 10;
  const CELL_SIZE = 100;

  let board, score, best, prevBoard, prevScore, won, gameOver;

  // ── INIT ──
  function newGame() {
    board    = Array.from({length:4},()=>Array(4).fill(0));
    score    = 0;
    won      = false;
    gameOver = false;
    prevBoard = null;
    prevScore = 0;
    document.getElementById('overlay').style.display = 'none';
    addTile(); addTile();
    render();
  }

  // ── ADD RANDOM TILE ──
  function addTile() {
    const empty = [];
    for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(!board[r][c]) empty.push([r,c]);
    if(!empty.length) return false;
    const [r,c] = empty[Math.floor(Math.random()*empty.length)];
    board[r][c] = Math.random()<0.9 ? 2 : 4;
    return [r,c];
  }

  // ── RENDER ──
  function render(newPos, mergedPos) {
    const grid = document.getElementById('grid');
    // remove old tiles
    grid.querySelectorAll('.tile').forEach(t=>t.remove());

    for(let r=0;r<4;r++){
      for(let c=0;c<4;c++){
        const val = board[r][c];
        if(!val) continue;
        const tile = document.createElement('div');
        const cls  = val<=1024?`t-${val}`:val===2048?'t-2048':'t-big';
        tile.className = `tile ${cls}`;
        tile.textContent = val;

        // position
        tile.style.left = (c*(CELL_SIZE+GAP)+10)+'px';
        tile.style.top  = (r*(CELL_SIZE+GAP)+10)+'px';

        // animation class
        if(newPos    && newPos[0]===r    && newPos[1]===c)    tile.classList.add('new-tile');
        if(mergedPos && mergedPos[0]===r && mergedPos[1]===c) tile.classList.add('merge-tile');

        grid.appendChild(tile);
      }
    }

    // scores
    document.getElementById('scoreDisplay').textContent = score;
    if(score > best) {
      best = score;
      document.getElementById('bestDisplay').textContent = best;
    }
  }

  // ── MOVE LOGIC ──
  function move(dir) {
    if(gameOver) return;

    // save undo state
    prevBoard = board.map(r=>[...r]);
    prevScore = score;

    let moved = false;
    const merged = []; // track merged positions for animation

    function slideRow(row) {
      // remove zeros
      let arr = row.filter(x=>x!==0);
      // merge adjacent equal
      for(let i=0;i<arr.length-1;i++){
        if(arr[i]===arr[i+1]){
          arr[i]*=2; score+=arr[i]; arr.splice(i+1,1);
        }
      }
      // pad zeros
      while(arr.length<4) arr.push(0);
      return arr;
    }

    if(dir==='left'){
      for(let r=0;r<4;r++){
        const old=[...board[r]];
        board[r]=slideRow(board[r]);
        if(board[r].join()!==old.join()) moved=true;
      }
    } else if(dir==='right'){
      for(let r=0;r<4;r++){
        const old=[...board[r]];
        board[r]=slideRow([...board[r]].reverse()).reverse();
        if(board[r].join()!==old.join()) moved=true;
      }
    } else if(dir==='up'){
      for(let c=0;c<4;c++){
        const col=board.map(r=>r[c]);
        const old=[...col];
        const slid=slideRow(col);
        slid.forEach((v,r)=>board[r][c]=v);
        if(slid.join()!==old.join()) moved=true;
      }
    } else if(dir==='down'){
      for(let c=0;c<4;c++){
        const col=board.map(r=>r[c]);
        const old=[...col];
        const slid=slideRow([...col].reverse()).reverse();
        slid.forEach((v,r)=>board[r][c]=v);
        if(slid.join()!==old.join()) moved=true;
      }
    }

    if(!moved) return;

    const newPos = addTile();
    render(newPos);
    checkWin();
    if(!won) checkLose();
  }

  // ── UNDO ──
  function undoMove() {
    if(!prevBoard) return;
    board = prevBoard.map(r=>[...r]);
    score = prevScore;
    prevBoard = null;
    gameOver = false;
    won = false;
    document.getElementById('overlay').style.display='none';
    render();
  }

  // ── CHECK WIN ──
  function checkWin() {
    for(let r=0;r<4;r++) for(let c=0;c<4;c++){
      if(board[r][c]===2048 && !won){
        won = true;
        showOverlay('YOU WIN!', 'win', 'YOU REACHED 2048!<br>KEEP GOING OR START OVER');
      }
    }
  }

  // ── CHECK LOSE ──
  function checkLose() {
    // any empty cell?
    for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(!board[r][c]) return;
    // any possible merge?
    for(let r=0;r<4;r++){
      for(let c=0;c<4;c++){
        if(c<3 && board[r][c]===board[r][c+1]) return;
        if(r<3 && board[r][c]===board[r+1][c]) return;
      }
    }
    gameOver = true;
    showOverlay('GAME OVER', 'lose', `NO MORE MOVES!<br>FINAL SCORE: ${score}`);
  }

  // ── OVERLAY ──
  function showOverlay(title, type, msg) {
    const ov = document.getElementById('overlay');
    const ot = document.getElementById('overlayTitle');
    const om = document.getElementById('overlayMsg');
    ot.textContent = title;
    ot.className   = type==='win' ? 'win-text' : 'lose-text';
    om.innerHTML   = msg;
    ov.style.display = 'flex';
  }

  // ── KEYBOARD ──
  document.addEventListener('keydown', e => {
    const map = {
      ArrowLeft:'left', ArrowRight:'right',
      ArrowUp:'up',     ArrowDown:'down',
      a:'left', d:'right', w:'up', s:'down',
      A:'left', D:'right', W:'up', S:'down'
    };
    if(map[e.key]) { e.preventDefault(); move(map[e.key]); }
  });

  // ── TOUCH SWIPE ──
  let touchStartX, touchStartY;
  document.addEventListener('touchstart', e=>{
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dx)>Math.abs(dy)){
      if(Math.abs(dx)>30) move(dx>0?'right':'left');
    } else {
      if(Math.abs(dy)>30) move(dy>0?'down':'up');
    }
  },{passive:true});

  // ── START ──
  best = 0;
  newGame();
</script>
</body>
</html>
