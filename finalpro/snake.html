<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Game</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    /* ── RESET ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── PAGE ── */
    body {
      background-color: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    /* ── SCANLINE OVERLAY ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── TITLE ── */
    h1 {
      color: #39ff14;
      font-size: 28px;
      letter-spacing: 6px;
      text-shadow:
        0 0 8px #39ff14,
        0 0 20px #39ff14,
        0 0 40px #39ff14;
      margin-bottom: 18px;
      animation: flicker 4s infinite;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96%            { opacity: 0.7; }
      97%            { opacity: 1; }
      98%            { opacity: 0.5; }
      99%            { opacity: 1; }
    }

    /* ── SCOREBOARD ROW ── */
    .scoreboard {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      width: 420px;
      margin-bottom: 10px;
    }

    .score-box {
      color: #fff;
      font-size: 9px;
      line-height: 1.8;
    }

    .score-box span {
      color: #39ff14;
      font-size: 13px;
      display: block;
      text-shadow: 0 0 6px #39ff14;
    }

    /* ── OUTER FRAME ── */
    .game-frame {
      border: 4px solid #39ff14;
      box-shadow:
        0 0 12px #39ff14,
        0 0 30px rgba(57,255,20,0.4),
        inset 0 0 12px rgba(57,255,20,0.05);
      padding: 6px;
      background: #050505;
      position: relative;
    }

    /* ── CANVAS ── */
    canvas {
      display: block;
      background: #080808;
      image-rendering: pixelated;
    }

    /* ── OVERLAY (start / game over / pause) ── */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 10;
    }

    #overlay h2 {
      color: #39ff14;
      font-size: 20px;
      text-align: center;
      text-shadow: 0 0 10px #39ff14, 0 0 24px #39ff14;
      line-height: 1.7;
    }

    #overlay p {
      color: #aaa;
      font-size: 8px;
      text-align: center;
      line-height: 2;
    }

    #overlay .high {
      color: #ff0077;
      font-size: 9px;
      text-shadow: 0 0 8px #ff0077;
    }

    /* ── START BUTTON ── */
    #startBtn {
      background: transparent;
      border: 2px solid #39ff14;
      color: #39ff14;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      padding: 12px 28px;
      cursor: pointer;
      letter-spacing: 2px;
      text-shadow: 0 0 6px #39ff14;
      box-shadow: 0 0 10px #39ff14, inset 0 0 10px rgba(57,255,20,0.05);
      transition: all 0.15s;
      animation: pulse-btn 1.5s infinite;
    }

    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 0 10px #39ff14, inset 0 0 10px rgba(57,255,20,0.05); }
      50%       { box-shadow: 0 0 22px #39ff14, inset 0 0 18px rgba(57,255,20,0.1); }
    }

    #startBtn:hover {
      background: #39ff14;
      color: #000;
      text-shadow: none;
      animation: none;
    }

    /* ── CONTROLS HINT ── */
    .controls {
      margin-top: 10px;
      display: flex;
      flex-direction: row;
      gap: 12px;
      align-items: center;
      justify-content: center;
    }

    .key {
      border: 2px solid #444;
      color: #888;
      font-size: 8px;
      padding: 4px 8px;
      border-radius: 3px;
      background: #111;
    }

    .key.active {
      border-color: #39ff14;
      color: #39ff14;
    }

    /* ── SPEED LABEL ── */
    .speed-label {
      color: #555;
      font-size: 7px;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    .speed-label span {
      color: #ff0077;
    }
  </style>
</head>
<body>

  <h1>🐍 SNAKE</h1>

  <!-- SCOREBOARD -->
  <div class="scoreboard">
    <div class="score-box">
      SCORE
      <span id="scoreDisplay">0</span>
    </div>
    <div class="score-box" style="text-align:right;">
      BEST
      <span id="highDisplay">0</span>
    </div>
  </div>

  <!-- GAME FRAME -->
  <div class="game-frame">
    <canvas id="gameCanvas" width="420" height="420"></canvas>

    <!-- OVERLAY -->
    <div id="overlay">
      <h2>SNAKE</h2>
      <p>USE ARROW KEYS OR WASD<br>TO MOVE THE SNAKE<br><br>EAT THE FOOD TO GROW<br>DON'T HIT THE WALLS!</p>
      <button id="startBtn">▶ START GAME</button>
    </div>
  </div>

  <!-- CONTROLS HINT -->
  <div class="controls">
    <div class="key active">▲</div>
    <div class="key active">▼</div>
    <div class="key active">◄</div>
    <div class="key active">►</div>
    <div style="color:#555; font-size:8px;">or</div>
    <div class="key">W</div>
    <div class="key">A</div>
    <div class="key">S</div>
    <div class="key">D</div>
    <div style="color:#555; font-size:8px; margin-left:8px;">P = PAUSE</div>
  </div>

  <div class="speed-label">SPEED INCREASES EVERY <span>5</span> FOODS</div>

<script>
  const canvas  = document.getElementById('gameCanvas');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const startBtn= document.getElementById('startBtn');
  const scoreEl = document.getElementById('scoreDisplay');
  const highEl  = document.getElementById('highDisplay');

  // ── GRID ──
  const COLS = 21;
  const ROWS = 21;
  const CELL = canvas.width / COLS;   // 20px per cell

  // ── GAME STATE ──
  let snake, dir, nextDir, food, score, highScore, speed, gameLoop, paused, started;

  highScore = 0;

  function initGame() {
    snake   = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score   = 0;
    speed   = 130;
    paused  = false;
    started = true;
    spawnFood();
    updateScore();
  }

  // ── FOOD ──
  function spawnFood() {
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  // ── SCORE ──
  function updateScore() {
    scoreEl.textContent = score;
    if (score > highScore) {
      highScore = score;
      highEl.textContent = highScore;
    }
  }

  // ── DRAW GRID ──
  function drawGrid() {
    ctx.strokeStyle = 'rgba(57,255,20,0.04)';
    ctx.lineWidth   = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL, 0);
      ctx.lineTo(x * CELL, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * CELL);
      ctx.lineTo(canvas.width, y * CELL);
      ctx.stroke();
    }
  }

  // ── DRAW SNAKE ──
  function drawSnake() {
    snake.forEach((seg, i) => {
      const x = seg.x * CELL;
      const y = seg.y * CELL;
      const pad = 1.5;

      if (i === 0) {
        // HEAD
        const grad = ctx.createRadialGradient(
          x + CELL/2, y + CELL/2, 2,
          x + CELL/2, y + CELL/2, CELL
        );
        grad.addColorStop(0, '#7fff3a');
        grad.addColorStop(1, '#39ff14');
        ctx.fillStyle = grad;
        ctx.shadowColor  = '#39ff14';
        ctx.shadowBlur   = 14;
        ctx.beginPath();
        ctx.roundRect(x + pad, y + pad, CELL - pad*2, CELL - pad*2, 4);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Eyes
        const eyeSize = 2.5;
        ctx.fillStyle = '#000';
        if (dir.x === 1) {  // right
          ctx.fillRect(x+CELL-7, y+5,  eyeSize, eyeSize);
          ctx.fillRect(x+CELL-7, y+CELL-8, eyeSize, eyeSize);
        } else if (dir.x === -1) { // left
          ctx.fillRect(x+3, y+5,  eyeSize, eyeSize);
          ctx.fillRect(x+3, y+CELL-8, eyeSize, eyeSize);
        } else if (dir.y === -1) { // up
          ctx.fillRect(x+5,      y+3, eyeSize, eyeSize);
          ctx.fillRect(x+CELL-8, y+3, eyeSize, eyeSize);
        } else { // down
          ctx.fillRect(x+5,      y+CELL-7, eyeSize, eyeSize);
          ctx.fillRect(x+CELL-8, y+CELL-7, eyeSize, eyeSize);
        }

      } else {
        // BODY — fade to darker green
        const ratio  = i / snake.length;
        const green  = Math.floor(255 - ratio * 100);
        ctx.fillStyle   = `rgb(20, ${green}, 10)`;
        ctx.shadowColor = '#39ff14';
        ctx.shadowBlur  = 4;
        ctx.beginPath();
        ctx.roundRect(x + pad, y + pad, CELL - pad*2, CELL - pad*2, 3);
        ctx.fill();
        ctx.shadowBlur = 0;

        // inner shine
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.beginPath();
        ctx.roundRect(x + pad + 2, y + pad + 2, (CELL - pad*2)*0.5, (CELL - pad*2)*0.4, 2);
        ctx.fill();
      }
    });
  }

  // ── DRAW FOOD ──
  function drawFood() {
    const x = food.x * CELL + CELL / 2;
    const y = food.y * CELL + CELL / 2;
    const r = CELL / 2 - 3;

    // glow
    ctx.shadowColor = '#ff0077';
    ctx.shadowBlur  = 16;

    // circle
    ctx.fillStyle = '#ff0077';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    // shine
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(x - r*0.28, y - r*0.28, r * 0.38, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
  }

  // ── DRAW FRAME ──
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // background
    ctx.fillStyle = '#080808';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawGrid();
    drawFood();
    drawSnake();
  }

  // ── UPDATE ──
  function update() {
    dir = { ...nextDir };

    const head = {
      x: snake[0].x + dir.x,
      y: snake[0].y + dir.y
    };

    // wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      gameOver(); return;
    }

    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver(); return;
    }

    snake.unshift(head);

    // ate food?
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      updateScore();
      spawnFood();
      // speed up every 5 foods
      if (score % 50 === 0 && speed > 60) {
        speed = Math.max(60, speed - 12);
        restartLoop();
      }
    } else {
      snake.pop();
    }

    draw();
  }

  // ── GAME OVER ──
  function gameOver() {
    clearInterval(gameLoop);
    started = false;

    // flash snake red
    ctx.fillStyle = 'rgba(255,0,0,0.25)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    overlay.innerHTML = `
      <h2>GAME OVER</h2>
      <p class="high">SCORE: ${score}</p>
      <p>BEST: ${highScore}</p>
      <button id="startBtn" onclick="startGame()">▶ PLAY AGAIN</button>
    `;
    overlay.style.display = 'flex';

    // re-attach style to new button
    const nb = document.getElementById('startBtn');
    applyBtnStyle(nb);
  }

  function applyBtnStyle(btn) {
    btn.style.cssText = `
      background: transparent;
      border: 2px solid #39ff14;
      color: #39ff14;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      padding: 12px 28px;
      cursor: pointer;
      letter-spacing: 2px;
      text-shadow: 0 0 6px #39ff14;
      box-shadow: 0 0 10px #39ff14;
    `;
  }

  // ── LOOP CONTROL ──
  function restartLoop() {
    clearInterval(gameLoop);
    gameLoop = setInterval(update, speed);
  }

  // ── START ──
  function startGame() {
    overlay.style.display = 'none';
    initGame();
    restartLoop();
  }

  // ── PAUSE ──
  function togglePause() {
    if (!started) return;
    paused = !paused;
    if (paused) {
      clearInterval(gameLoop);
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle  = '#39ff14';
      ctx.font       = "12px 'Press Start 2P'";
      ctx.textAlign  = 'center';
      ctx.shadowColor= '#39ff14';
      ctx.shadowBlur = 12;
      ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
      ctx.shadowBlur = 0;
    } else {
      restartLoop();
    }
  }

  // ── KEYBOARD ──
  document.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowUp':    case 'w': case 'W':
        if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; break;
      case 'ArrowDown':  case 's': case 'S':
        if (dir.y !== -1) nextDir = { x: 0, y: 1 };  break;
      case 'ArrowLeft':  case 'a': case 'A':
        if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; break;
      case 'ArrowRight': case 'd': case 'D':
        if (dir.x !== -1) nextDir = { x: 1, y: 0 };  break;
      case 'p': case 'P':
        togglePause(); break;
    }
    // prevent page scroll on arrow keys
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
      e.preventDefault();
    }
  });

  // ── INITIAL BUTTON ──
  startBtn.addEventListener('click', startGame);

  // ── DRAW IDLE SCREEN ──
  draw();
</script>
</body>
</html>
